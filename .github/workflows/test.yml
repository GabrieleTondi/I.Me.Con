name: CI Test Suite

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: imecon
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install dependencies
      run: npm ci

    - name: Run Drizzle Migrations/Push to Test DB
      run: npx drizzle-kit push
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/imecon

    - name: Run Database Seeding
      run: npm run db:seed
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/imecon

    - name: Run Database Integrity Check
      run: npx tsx src/tests/verify-db.ts
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/imecon

    - name: Run Unit Tests (Vitest)
      run: npx vitest run
      env:
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/imecon
        SESSION_SECRET: test_very_secure_session_secret_1234567890123456
